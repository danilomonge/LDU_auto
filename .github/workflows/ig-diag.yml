name: Instagram credentials diagnostic

on:
  workflow_dispatch:
    inputs:
      deep:
        description: 'Also verify WRITE permission (creates nothing visible)'
        type: boolean
        default: false

jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - name: Resolve access token
        env:
          TOKEN_KEY: ${{ secrets.TOKEN_KEY }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
        run: |
          T="$IG_ACCESS_TOKEN"
          if [ -n "$TOKEN_KEY" ] && [ -f data/token.enc ]; then
            T=$(openssl enc -d -aes-256-cbc -pbkdf2 -iter 100000 -salt -pass env:TOKEN_KEY -base64 -A -in data/token.enc)
            echo "Using auto-renewed token from data/token.enc (secret kept as fallback)"
            if [ -n "$IG_ACCESS_TOKEN" ] && [ "$IG_ACCESS_TOKEN" != "$T" ]; then
              echo "IG_ACCESS_TOKEN_FALLBACK=$IG_ACCESS_TOKEN" >> "$GITHUB_ENV"
            fi
          else
            echo "Using IG_ACCESS_TOKEN secret directly"
          fi
          echo "::add-mask::$T"
          echo "IG_ACCESS_TOKEN=$T" >> "$GITHUB_ENV"

      - name: Diagnose Instagram credentials
        env:
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          FACEBOOK_USER_ID: ${{ secrets.FACEBOOK_USER_ID }}
          FACEBOOK_ACCESS_TOKEN: ${{ secrets.FACEBOOK_ACCESS_TOKEN }}
        run: node src/index.js diag ${{ inputs.deep && '--deep' || '' }}
