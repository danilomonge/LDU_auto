name: LDU Instagram posts

on:
  schedule:
    # Every hour — the pipeline is a no-op unless ESPN state changed
    # (new next match, rescheduled kickoff, or a freshly finished game).
    - cron: '0 * * * *'
  workflow_dispatch: {}

concurrency:
  group: ldu-posts
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          # Pull latest state committed by previous runs.
          ref: main

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - run: npm test

      - name: Generate posts on state changes
        run: node src/index.js generate

      - name: Prune rendered posts older than 30 days
        run: node src/index.js cleanup

      - name: Commit generated posts and state
        id: commit
        run: |
          git config user.name "ldu-post-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A data output
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "posts: $(date -u +'%Y-%m-%d %H:%M') UTC"
            git pull --rebase origin main
            git push origin main
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve access token
        # Prefer the auto-renewed encrypted token (data/token.enc) over the
        # static IG_ACCESS_TOKEN secret.
        env:
          TOKEN_KEY: ${{ secrets.TOKEN_KEY }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
        run: |
          T="$IG_ACCESS_TOKEN"
          if [ -n "$TOKEN_KEY" ] && [ -f data/token.enc ]; then
            T=$(openssl enc -d -aes-256-cbc -pbkdf2 -iter 100000 -salt -pass env:TOKEN_KEY -base64 -A -in data/token.enc)
            echo "Using auto-renewed token from data/token.enc"
          else
            echo "Using IG_ACCESS_TOKEN secret directly"
          fi
          echo "::add-mask::$T"
          echo "IG_ACCESS_TOKEN=$T" >> "$GITHUB_ENV"

      - name: Publish pending posts to Instagram
        # Runs after push so the PNGs are reachable at their public raw URLs.
        env:
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          FACEBOOK_USER_ID: ${{ secrets.FACEBOOK_USER_ID }}
          FACEBOOK_ACCESS_TOKEN: ${{ secrets.FACEBOOK_ACCESS_TOKEN }}
          IMAGE_BASE_URL: ${{ vars.IMAGE_BASE_URL }}
        run: node src/index.js publish

      - name: Commit publish-queue updates
        # Must run even when publishing partially failed: the queue file
        # records which posts DID go out, preventing duplicates on retry.
        if: always()
        run: |
          git add -A data
          if ! git diff --cached --quiet; then
            git commit -m "publish: clear queue $(date -u +'%Y-%m-%d %H:%M') UTC"
            git pull --rebase origin main
            git push origin main
          fi
