name: Renew Meta access token

# Self-renewing tokens, no GitHub PAT required.
#
# Meta only resets the 60-day clock when exchanging USER tokens, so the cycle
# keeps BOTH tokens AES-256-encrypted in the repo:
#   data/usertoken.enc  long-lived user token (refreshed every run → +60 days)
#   data/token.enc      page token derived from it (what publishing uses)
# Twice a month: decrypt user token → fb_exchange (fresh 60 days) → derive
# page token → verify both → re-encrypt + commit. A run that cannot extend
# the expiry FAILS so GitHub emails the owner instead of dying silently.
#
# Secrets used:
#   TOKEN_KEY        encryption key (random, never changes)
#   FB_APP_ID / FB_APP_SECRET  Meta app credentials (never expire)
#   FB_USER_TOKEN    seed for the first run (any still-valid user token)
#   IG_ACCESS_TOKEN  legacy seed/fallback for the page token
#   FACEBOOK_USER_ID page id, used to pick and verify the page token

# 2026-07-09: schedule removed — publishing now runs on a never-expiring
# USER token in the IG_ACCESS_TOKEN secret (the page token is derived on the
# fly by src/publish.js), so there is nothing to renew and the cron only
# produced failure emails (fb_exchange kept returning OAuthException code 2).
# The workflow stays manually runnable: reseed FB_USER_TOKEN and dispatch it
# if an expiring token ever needs the renewal cycle again.
on:
  workflow_dispatch: {}

concurrency:
  group: ldu-posts # never race the publishing workflow's commits
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  renew:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main

      - name: Renew, verify and store tokens
        env:
          TOKEN_KEY: ${{ secrets.TOKEN_KEY }}
          FB_APP_ID: ${{ secrets.FB_APP_ID }}
          FB_APP_SECRET: ${{ secrets.FB_APP_SECRET }}
          FB_USER_TOKEN: ${{ secrets.FB_USER_TOKEN }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          FACEBOOK_USER_ID: ${{ secrets.FACEBOOK_USER_ID }}
        run: |
          set -euo pipefail
          GRAPH="https://graph.facebook.com/v23.0"
          dec() { openssl enc -d -aes-256-cbc -pbkdf2 -iter 100000 -salt -pass env:TOKEN_KEY -base64 -A -in "$1"; }
          enc() { printf %s "$2" | openssl enc -aes-256-cbc -pbkdf2 -iter 100000 -salt -pass env:TOKEN_KEY -base64 -A -out "$1"; }
          expiry() { curl -s "$GRAPH/debug_token?input_token=$1&access_token=$1" | jq -r '.data.expires_at // -1'; }
          commit_all() {
            git config user.name "ldu-post-bot"
            git config user.email "actions@users.noreply.github.com"
            git add data/token.enc data/usertoken.enc 2>/dev/null || true
            git diff --cached --quiet || { git commit -m "token: renewed $(date -u +%F)"; git pull --rebase origin main; git push origin main; }
          }

          [ -n "${TOKEN_KEY:-}" ] || { echo "::error::TOKEN_KEY secret is not set."; exit 1; }
          if [ -z "${FB_APP_ID:-}" ] || [ -z "${FB_APP_SECRET:-}" ]; then
            echo "::error::FB_APP_ID / FB_APP_SECRET not set — cannot renew."
            exit 1
          fi

          # --- User token: stored copy, else the FB_USER_TOKEN seed secret.
          UT=""
          if [ -f data/usertoken.enc ]; then UT=$(dec data/usertoken.enc); elif [ -n "${FB_USER_TOKEN:-}" ]; then UT="$FB_USER_TOKEN"; fi
          [ -n "$UT" ] && echo "::add-mask::$UT"

          if [ -n "$UT" ]; then
            # Inspect the seed token with the app token (app_id|app_secret) —
            # works even when no user/page token is alive, and prints whether
            # the seed is valid, when it expires and which scopes it carries.
            DBG=$(curl -s "$GRAPH/debug_token?input_token=${UT}&access_token=${FB_APP_ID}|${FB_APP_SECRET}")
            echo "Seed token: $(printf %s "$DBG" | jq -c '.data // .error | {is_valid, type, expires_at, scopes, message: .message}' 2>/dev/null || echo unparseable)"
            # Primary path: refresh the user token (this RESETS the 60 days)…
            RESP=$(curl -s "$GRAPH/oauth/access_token?grant_type=fb_exchange_token&client_id=${FB_APP_ID}&client_secret=${FB_APP_SECRET}&fb_exchange_token=${UT}")
            NU=$(printf %s "$RESP" | jq -r '.access_token // empty')
            if [ -z "$NU" ]; then
              # Surface Meta's error message (never contains the token) so the
              # failing piece (app id vs secret vs token) is identifiable.
              echo "Meta says: $(printf %s "$RESP" | jq -c '.error | {message, type, code}' 2>/dev/null || echo unparseable)"
              echo "::error::User-token refresh failed (expired or revoked). Generate a fresh token in the Graph API Explorer, update the FB_USER_TOKEN secret, delete data/usertoken.enc and re-run."
              exit 1
            fi
            echo "::add-mask::$NU"
            # …and derive a fresh page token from it.
            ACCTS=$(curl -s "$GRAPH/me/accounts?fields=id,access_token&access_token=${NU}")
            NEW=$(printf %s "$ACCTS" | jq -r --arg id "${FACEBOOK_USER_ID:-}" '.data[]? | select(.id==$id) | .access_token // empty')
            if [ -z "$NEW" ]; then
              echo "Meta says: $(printf %s "$ACCTS" | jq -c 'if .error then .error | {message, type, code} else {pages_visible: [.data[]?.id]} end' 2>/dev/null || echo unparseable)"
              echo "::error::Could not derive a page token for FACEBOOK_USER_ID from the refreshed user token."
              exit 1
            fi
            echo "::add-mask::$NEW"

            # Verify the page token works before storing anything.
            OK=$(curl -s "$GRAPH/${FACEBOOK_USER_ID}?fields=id&access_token=${NEW}" | jq -r 'has("id")')
            [ "$OK" = "true" ] || { echo "::error::Renewed page token failed verification — keeping previous tokens."; exit 1; }

            NEW_EXP=$(expiry "$NEW"); NU_EXP=$(expiry "$NU")
            echo "Renewed. User token expires: $([ "$NU_EXP" = "0" ] && echo never || date -u -d "@$NU_EXP" +%F 2>/dev/null || echo "$NU_EXP"); page token expires: $([ "$NEW_EXP" = "0" ] && echo never || date -u -d "@$NEW_EXP" +%F 2>/dev/null || echo "$NEW_EXP")"
            enc data/usertoken.enc "$NU"
            enc data/token.enc "$NEW"
            commit_all
            echo "Tokens renewed, verified and stored."
            exit 0
          fi

          # --- No user token anywhere: page-token exchange does NOT extend
          # the expiry (Meta pins it to the original session), so renewal is
          # impossible. Fail loudly with instructions.
          PT=""
          if [ -f data/token.enc ]; then PT=$(dec data/token.enc); else PT="${IG_ACCESS_TOKEN:-}"; fi
          if [ -n "$PT" ]; then
            P_EXP=$(expiry "$PT")
            echo "Current page token expires: $([ "$P_EXP" = "0" ] && echo never || date -u -d "@$P_EXP" +%F 2>/dev/null || echo "$P_EXP")"
            if [ "$P_EXP" = "0" ]; then
              echo "Page token never expires — nothing to renew."
              exit 0
            fi
          fi
          echo "::error::No user token available and page-token exchange cannot extend expiry. Add the FB_USER_TOKEN secret (any valid token from the Graph API Explorer) and re-run this workflow once — afterwards the cycle sustains itself."
          exit 1
